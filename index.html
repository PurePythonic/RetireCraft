<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>RetireCraft — FIRE Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@latest/build/stlite.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --surface: #f8fafc;
        --border: #e2e8f0;
        --text: #1e293b;
        --muted: #64748b;
        --accent: #f59e0b;
        --green: #10b981;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        font-family: "Inter", sans-serif;
        color: var(--text);
        overflow: hidden;
      }

      #root {
        height: 100vh;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition:
          opacity 0.6s ease,
          visibility 0.6s ease;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(226, 232, 240, 0.8) 1px, transparent 1px),
          linear-gradient(90deg, rgba(226, 232, 240, 0.8) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(
          ellipse 80% 70% at 50% 50%,
          black 30%,
          transparent 100%
        );
      }

      .splash-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .splash-content {
        position: relative;
        text-align: center;
        z-index: 1;
      }

      .splash-icon {
        font-size: 3.2rem;
        line-height: 1;
        margin-bottom: 12px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .splash-title {
        font-family: "Syne", sans-serif;
        font-size: 3rem;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: -0.03em;
        line-height: 1;
        margin-bottom: 6px;
      }

      .splash-subtitle {
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-weight: 500;
        margin-bottom: 48px;
      }

      .splash-bar-wrap {
        width: 260px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin: 0 auto 16px;
      }

      .splash-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);
        animation: progress 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        width: 0%;
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        60% {
          width: 75%;
        }
        85% {
          width: 90%;
        }
        100% {
          width: 100%;
        }
      }

      .splash-status {
        font-size: 0.75rem;
        color: #475569;
        letter-spacing: 0.06em;
        animation: blink 1.4s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .splash-badges {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 52px;
      }

      .splash-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-grid"></div>
      <div class="splash-glow"></div>
      <div class="splash-content">
        <div class="splash-icon">🔥</div>
        <div class="splash-title">RetireCraft</div>
        <div class="splash-subtitle">Financial Independence Calculator</div>
        <div class="splash-bar-wrap">
          <div class="splash-bar-fill"></div>
        </div>
        <div class="splash-status">Loading Python runtime…</div>
        <div class="splash-badges">
          <div class="splash-badge">
            <div class="dot" style="background: #10b981"></div>
            FIRE Planning
          </div>
          <div class="splash-badge">
            <div class="dot" style="background: #f59e0b"></div>
            4 Strategies
          </div>
          <div class="splash-badge">
            <div class="dot" style="background: #c084fc"></div>
            Sensitivity Analysis
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@latest/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["pandas", "altair"],
          entrypoint: "app.py",
          files: {
            "app.py": { url: "app.py" },
          },
        },
        document.getElementById("root"),
      );

      let splashRemoved = false;

      function removeSplash() {
        if (splashRemoved) return;
        splashRemoved = true;
        const splash = document.getElementById("splash");
        if (splash) {
          splash.classList.add("hidden");
          setTimeout(() => splash.remove(), 700);
        }
      }

      const observer = new MutationObserver(() => {
        const appContent = document.querySelector(".stApp");
        if (appContent && appContent.children.length > 0) {
          setTimeout(removeSplash, 600);
        }
      });

      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });
      setTimeout(removeSplash, 8000);
    </script>
  </body>
</html>
